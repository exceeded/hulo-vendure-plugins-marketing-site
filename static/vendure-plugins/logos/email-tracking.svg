<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HULO Email Tracking">
  <title>HULO Email Tracking</title>
  <!-- HULO frame. -->
  <rect width="64" height="64" rx="14" fill="#0f1419"/>
  <!-- Envelope body — squared, high contrast, reads at 20px. Fill
       is white so the flap crease is visible against the dark frame. -->
  <rect x="12" y="20" width="40" height="26" rx="3"
        fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Envelope flap — angled line that turns the rectangle into an
       envelope shape unambiguously. -->
  <path d="M12 22 L32 36 L52 22"
        fill="none" stroke="#ffffff" stroke-width="2.5"
        stroke-linejoin="round"/>
  <!-- Signal / open-tracked pulse. Three amber arcs on the right —
       the "tracking beacon" that tells email-tracking from a plain
       envelope icon. -->
  <path d="M43 12 A6 6 0 0 1 49 18" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 10 A9 9 0 0 1 49 19" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="47" cy="19" r="1.8" fill="#f59e0b"/>
</svg>
